name: Rapport d'incident
description: Signalez un incident de service en cours ou récemment résolu.
title: "[Incident]: "
labels:
  - incident
body:
  - type: markdown
    attributes:
      value: |
        Utilisez ce modèle pour les pannes, dégradations, problèmes de données ou incidents opérationnels liés à la sécurité.

  - type: input
    id: summary
    attributes:
      label: Résumé de l'incident
      description: Description de l'incident en une ligne.
      placeholder: Hausse du taux d'erreurs sur...
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Statut actuel
      options:
        - en investigation
        - identifié
        - sous surveillance
        - résolu
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Criticité
      options:
        - sev4
        - sev3
        - sev2
        - sev1
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Chronologie
      description: Horodatages clés (détection, mitigation, résolution) en UTC.
      placeholder: |
        - 2026-03-01 13:10 UTC détecté
        - 2026-03-01 13:35 UTC mitigation appliquée
        - 2026-03-01 14:05 UTC résolu
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Évaluation de l'impact
      description: Utilisateurs/systèmes affectés et étendue de l'impact.
    validations:
      required: true

  - type: textarea
    id: actions
    attributes:
      label: Mitigation et prochaines actions
      description: Ce qui a été fait et ce qui reste à faire.
    validations:
      required: true

  - type: checkboxes
    id: communications
    attributes:
      label: Communications
      options:
        - label: Les parties prenantes internes ont été notifiées.
          required: false
        - label: Une communication externe est requise ou terminée (si applicable).
          required: false
