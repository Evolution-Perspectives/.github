name: New Page Web Orchestration

on:
  issues:
    types:
      - opened
  workflow_dispatch:
    inputs:
      issue_number:
        description: Intake issue number to process.
        required: true
        type: number
      debug:
        description: Enable verbose logs.
        required: false
        default: false
        type: boolean

jobs:
  orchestrate_from_issues:
    if: ${{ github.event_name == 'issues' }}
    uses: ./.github/workflows/new-page-web-orchestration-action.yml
    with:
      issue_node_id: ${{ github.event.issue.node_id }}
      issue_number: ${{ github.event.issue.number }}
      source_repository: ${{ github.repository }}
      project_id: PVT_kwDOCIcusc4BOGrD
      priority_field_id: PVTSSF_lADOCIcusc4BOGrDzg852o8
      debug: false
    secrets:
      automation_pat: ${{ secrets.EP_AUTOMATION_PAT }}

  orchestrate_from_dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/new-page-web-orchestration-action.yml
    with:
      issue_node_id: ''
      issue_number: ${{ inputs.issue_number }}
      source_repository: ${{ github.repository }}
      project_id: PVT_kwDOCIcusc4BOGrD
      priority_field_id: PVTSSF_lADOCIcusc4BOGrDzg852o8
      debug: ${{ inputs.debug }}
    secrets:
      automation_pat: ${{ secrets.EP_AUTOMATION_PAT }}
