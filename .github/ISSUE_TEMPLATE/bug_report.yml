name: Bug report
description: Report a reproducible problem or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail for maintainers to reproduce and triage quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the issue.
      placeholder: Unexpected behavior when...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: It should...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: Instead, it...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, ordered, reproducible sequence.
      placeholder: |
        1. Go to...
        2. Run...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe user/business/operational impact.
      placeholder: Affects..., blocks..., severity...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Select the current severity level.
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant context (OS, browser, version, configuration, etc.).
      placeholder: Windows 11, Chrome 131, app version...
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Logs, screenshots, or links
      description: Share sanitized diagnostics, screenshots, or references.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest available version.
          required: true
