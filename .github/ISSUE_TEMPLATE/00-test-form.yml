name: Formulaire de test
description: Utilisez ce formulaire pour tester le comportement des Issue Forms GitHub.
title: "[Test]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Ce formulaire est réservé aux tests.

  - type: input
    id: test-summary
    attributes:
      label: Résumé
      description: Saisissez un court résumé du test.
      placeholder: Test des formulaires d'issue
    validations:
      required: true

  - type: dropdown
    id: test-priority
    attributes:
      label: Priorité
      description: Sélectionnez n'importe quelle option pour le test.
      options:
        - faible
        - moyenne
        - élevée
    validations:
      required: true

  - type: checkboxes
    id: test-confirm
    attributes:
      label: Confirmation
      options:
        - label: Je confirme qu'il s'agit uniquement d'une issue de test.
          required: true

  - type: textarea
    id: test-notes
    attributes:
      label: Notes
      description: Ajoutez vos observations sur le comportement du formulaire.
      placeholder: Le formulaire a fonctionné comme prévu...
    validations:
      required: false
