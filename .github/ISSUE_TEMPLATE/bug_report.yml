name: Signalement de bug
description: Signalez un problème reproductible ou une régression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci pour votre signalement. Veuillez fournir suffisamment de détails pour permettre une reproduction et un triage rapides.

  - type: input
    id: summary
    attributes:
      label: Résumé
      description: Brève description du problème.
      placeholder: Comportement inattendu lorsque...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devait-il se passer ?
      placeholder: Cela devrait...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Que s'est-il réellement passé ?
      placeholder: À la place, cela...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      description: Fournissez une séquence minimale, ordonnée et reproductible.
      placeholder: |
        1. Aller à...
        2. Exécuter...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Décrivez l'impact utilisateur, métier ou opérationnel.
      placeholder: Affecte..., bloque..., criticité...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Criticité
      description: Sélectionnez le niveau de criticité actuel.
      options:
        - faible
        - moyenne
        - élevée
        - critique
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: Tout contexte pertinent (OS, navigateur, version, configuration, etc.).
      placeholder: Windows 11, Chrome 131, version de l'application...
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Logs, captures d'écran ou liens
      description: Partagez des diagnostics anonymisés, captures d'écran ou références.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications avant soumission
      options:
        - label: J'ai recherché dans les issues existantes et je n'ai pas trouvé de doublon.
          required: true
        - label: Je peux reproduire le problème sur la dernière version disponible.
          required: true
