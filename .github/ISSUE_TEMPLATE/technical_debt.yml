name: Dette technique
description: Suivez la dette de maintenabilité, fiabilité ou architecture.
title: "[Tech Debt]: "
labels:
  - technical-debt
body:
  - type: markdown
    attributes:
      value: |
        Utilisez ce modèle pour documenter la dette qui ralentit la livraison, augmente le risque ou alourdit les coûts de maintenance.

  - type: input
    id: debt-summary
    attributes:
      label: Résumé de la dette
      description: Description concise de l'élément de dette.
      placeholder: Logique dupliquée dans...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte
      description: Pourquoi cette dette existe et où elle apparaît.
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risque si non traité
      description: Impact sur la fiabilité, la performance, la sécurité ou la livraison.
    validations:
      required: true

  - type: textarea
    id: remediation
    attributes:
      label: Remédiation proposée
      description: Approche suggérée et critères d'acceptation.
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort estimé
      options:
        - faible
        - moyen
        - important
        - très important
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priorité
      options:
        - faible
        - moyenne
        - élevée
    validations:
      required: true
