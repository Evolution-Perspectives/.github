name: Demande de fonctionnalité
description: Proposez une amélioration ou une nouvelle capacité.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Merci de partager votre idée. Une formulation claire du problème aide les mainteneurs à évaluer la priorité et le périmètre.

  - type: input
    id: problem
    attributes:
      label: Problème à résoudre
      description: Quel problème essayez-vous de résoudre ?
      placeholder: En tant que..., j'ai besoin de..., afin de...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Solution proposée
      description: Décrivez le comportement et le résultat attendus.
      placeholder: Nous pourrions ajouter...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Quelles autres approches avez-vous évaluées ?
      placeholder: Nous avons envisagé..., mais...
    validations:
      required: false

  - type: textarea
    id: value
    attributes:
      label: Valeur et impact
      description: Qui en bénéficie et comment ?
      placeholder: Améliore..., réduit..., permet...
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgence
      description: Dans quelle mesure cette demande est-elle urgente ?
      options:
        - faible
        - moyenne
        - élevée
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Périmètre et dépendances
      description: Mentionnez les zones potentiellement impactées, contraintes ou dépendances.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications avant soumission
      options:
        - label: J'ai recherché dans les issues existantes et je n'ai pas trouvé de demande en doublon.
          required: true
        - label: Cette demande décrit un problème et un résultat attendu, pas seulement un détail d'implémentation.
          required: true
